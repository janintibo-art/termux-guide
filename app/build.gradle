plugins {
    id 'com.android.application'
}

android {
    namespace 'com.termuxguide.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.termuxguide.app"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Volontairement minimal : l'app utilise une WebView native, aucune
    // bibliothèque externe n'est nécessaire pour garder la compilation simple.
}
