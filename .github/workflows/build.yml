name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer les composants du SDK
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Préparer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Compiler l'APK (debug)
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Renommer l'APK
        run: cp app/build/outputs/apk/debug/app-debug.apk TermuxGuide.apk

      - name: Publier l'APK comme artefact téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: TermuxGuide-apk
          path: TermuxGuide.apk

      - name: Publier dans une Release "latest"
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Dernière version
          body: APK compilé automatiquement à partir de la branche main.
          files: TermuxGuide.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
