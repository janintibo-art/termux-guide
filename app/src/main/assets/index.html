<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>Termux Guide</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Barre supérieure -->
  <header class="appbar" id="appbar">
    <button class="appbar__back" id="backBtn" aria-label="Retour">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="appbar__brand">
      <span class="appbar__prompt">~ $</span>
      <span class="appbar__name" id="appbarTitle">termux-guide</span>
    </div>
    <span class="appbar__blink">▮</span>
  </header>

  <!-- Contenu (injecté par app.js) -->
  <main id="app"></main>

  <!-- Navigation du bas -->
  <nav class="tabbar" id="tabbar">
    <button class="tab is-active" data-tab="home">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Accueil</span>
    </button>
    <button class="tab" data-tab="projects">
      <svg viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h4l2 2h6a2 2 0 012 2v9a2 2 0 01-2 2H6a2 2 0 01-2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Projets</span>
    </button>
    <button class="tab" data-tab="codes">
      <svg viewBox="0 0 24 24"><path d="M9 8l-4 4 4 4M15 8l4 4-4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Codes</span>
    </button>
    <button class="tab" data-tab="tips">
      <svg viewBox="0 0 24 24"><path d="M9 18h6M10 21h4M12 3a6 6 0 00-4 10.5c.7.7 1 1.3 1 2.5h6c0-1.2.3-1.8 1-2.5A6 6 0 0012 3z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Astuces</span>
    </button>
  </nav>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
